<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Mock Interview in progress — answer questions and get instant AI-powered feedback.">
    <title>Interview in Progress — InterviewAI</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="navbar-brand">
            <span class="icon">🎯</span>
            <span>InterviewAI</span>
        </div>
        <div class="navbar-meta">
            <span id="meta-role">—</span>
            <span>•</span>
            <span id="meta-level">—</span>
        </div>
    </nav>

    <!-- Progress Bar -->
    <div class="progress-container" id="progress-container">
        <div class="progress-info">
            <span class="progress-label">Interview Progress</span>
            <span class="progress-count" id="progress-text">Question 1 of —</span>
        </div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Question Section -->
        <div class="question-section" id="question-section">
            <div class="glass-card-static fade-in" id="question-card">
                <div class="question-header">
                    <span class="question-number" id="question-number">Q1</span>
                    <span class="badge badge-technical" id="question-category">Technical</span>
                    <span class="badge badge-difficulty badge-medium" id="question-difficulty">Medium</span>
                </div>
                <p class="question-text" id="question-text">Loading question...</p>
            </div>

            <!-- Answer Input -->
            <div class="glass-card-static mt-xl fade-in fade-in-delay-1" id="answer-section">
                <label class="form-label" for="answer-input">Your Answer</label>
                <textarea 
                    class="form-textarea" 
                    id="answer-input" 
                    placeholder="Type your answer here. Be specific, use examples from your experience, and structure your response clearly..."
                    maxlength="5000"
                ></textarea>
                <div class="char-count">
                    <span id="char-count">0</span> / 5000 characters
                </div>
                <div class="action-bar" style="border-top: none; padding-top: var(--space-md);">
                    <button class="btn btn-secondary" id="skip-btn" type="button">
                        Skip Question
                    </button>
                    <button class="btn btn-primary btn-lg" id="submit-btn" type="button">
                        <span id="submit-btn-text">Submit Answer</span>
                        <span id="submit-btn-spinner" class="spinner-inline hidden"></span>
                    </button>
                </div>
            </div>

            <!-- Evaluation (shown after submission) -->
            <div class="evaluation-card hidden" id="evaluation-section">
                <div class="evaluation-header">
                    <div class="evaluation-score">
                        <span class="score-value" id="eval-score">—</span>
                        <span class="score-label">/ 10</span>
                    </div>
                    <span class="badge" id="eval-performance-badge">—</span>
                </div>
                <div class="evaluation-body">
                    <!-- Summary -->
                    <div class="evaluation-section">
                        <div class="evaluation-summary" id="eval-summary"></div>
                    </div>
                    <!-- Strengths -->
                    <div class="evaluation-section">
                        <h4 class="evaluation-section-title strengths">✅ Strengths</h4>
                        <ul class="evaluation-list strength-list" id="eval-strengths"></ul>
                    </div>
                    <!-- Weaknesses -->
                    <div class="evaluation-section">
                        <h4 class="evaluation-section-title weaknesses">⚠️ Areas for Improvement</h4>
                        <ul class="evaluation-list weakness-list" id="eval-weaknesses"></ul>
                    </div>
                    <!-- Improvements -->
                    <div class="evaluation-section">
                        <h4 class="evaluation-section-title improvements">💡 Suggestions</h4>
                        <ul class="evaluation-list improvement-list" id="eval-improvements"></ul>
                    </div>

                    <!-- Next / Results Button -->
                    <div class="action-bar">
                        <div></div>
                        <button class="btn btn-primary btn-lg" id="next-btn" type="button">
                            <span id="next-btn-text">Next Question →</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Evaluating your answer...</div>
        <div class="loading-subtext">Our AI is analyzing your response</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Pass session ID to JS -->
    <script>
        window.SESSION_ID = "{{ session_id }}";
    </script>
    <script src="/static/js/interview.js"></script>
</body>
</html>
